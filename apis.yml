aid: tagetik
name: CCH Tagetik
description: >-
  CCH Tagetik (a Wolters Kluwer solution) is a comprehensive Corporate
  Performance Management platform covering financial close and consolidation,
  extended planning and analysis, ESG and regulatory reporting, and corporate
  tax management. The platform exposes data via OData v4 REST APIs and SCIM,
  enabling integration with Power BI, Qlik, SAP HANA, and other BI tools.
  OAuth 2.0 and Basic Authentication are supported for secure access.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Analytics
  - Budgeting
  - Corporate Performance Management
  - ESG
  - Financial Close
  - Financial Consolidation
  - Financial Planning
  - OData
  - Reporting
created: '2025-01-15'
modified: '2026-05-03'
url: >-
