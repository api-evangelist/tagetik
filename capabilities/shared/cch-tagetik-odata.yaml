naftiko: "1.0.0-alpha1"

info:
  label: "CCH Tagetik OData API"
  description: >-
    OData v4 REST API for querying CCH Tagetik financial and analytical
    workspace data including consolidation models, budgets, forecasts,
    and actual financial results.
  tags:
    - Corporate Performance Management
    - Financial Close
    - Financial Data
    - OData
    - Reporting
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TAGETIK_ACCESS_TOKEN: TAGETIK_ACCESS_TOKEN
      TAGETIK_BASE_URL: TAGETIK_BASE_URL

capability:
  consumes:
    - type: http
      namespace: tagetik-odata
      baseUri: "{{TAGETIK_BASE_URL}}"
      description: "CCH Tagetik OData v4 REST API"
      authentication:
        type: bearer
        token: "{{TAGETIK_ACCESS_TOKEN}}"
      resources:
        - name: metadata
          path: /$metadata
          description: "OData service metadata describing available entity sets"
          operations:
            - name: get-odata-metadata
              method: GET
              description: "Retrieve OData service metadata"
              inputParameters:
                - name: database
                  in: query
                  type: string
                  required: true
                  description: "CCH Tagetik database code"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: financial-data
          path: /odata/{database}/FinancialData
          description: "Financial data from consolidated models"
          operations:
            - name: query-financial-data
              method: GET
              description: "Query financial data records with OData filters"
              inputParameters:
                - name: database
                  in: path
                  type: string
                  required: true
                  description: "Database code"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated fields to return"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Max rows to return"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Rows to skip for pagination"
                - name: $orderby
                  in: query
                  type: string
                  required: false
                  description: "Sort field and direction"
                - name: $count
                  in: query
                  type: boolean
                  required: false
                  description: "Include total count"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.value"

        - name: analytical-data
          path: /odata/{database}/{workspace}
          description: "Analytical workspace data"
          operations:
            - name: query-analytical-data
              method: GET
              description: "Query analytical workspace dataset records"
              inputParameters:
                - name: database
                  in: path
                  type: string
                  required: true
                  description: "Database code"
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Analytical workspace entity set name"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Fields to return"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Max rows"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.value"

  exposes:
    - type: rest
      port: 8100
      namespace: tagetik-odata-rest
      resources:
        - path: /v1/financial-data
          name: financial-data
          description: "Query financial consolidation data"
          operations:
            - method: GET
              name: query-financial-data
              description: "Retrieve financial records with optional filters"
              call: "tagetik-odata.query-financial-data"
              with:
                database: "rest.database"
                $filter: "rest.filter"
                $top: "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tagetik-odata-mcp
      transport: http
      tools:
        - name: query-financial-data
          description: "Query CCH Tagetik financial data with OData filters"
          hints:
            readOnly: true
            openWorld: false
          call: "tagetik-odata.query-financial-data"
          with:
            database: "tools.database"
            $filter: "tools.filter"
            $top: "tools.top"
          outputParameters:
            - type: object
              mapping: "$."

        - name: query-analytical-data
          description: "Query CCH Tagetik analytical workspace data"
          hints:
            readOnly: true
            openWorld: false
          call: "tagetik-odata.query-analytical-data"
          with:
            database: "tools.database"
            workspace: "tools.workspace"
            $filter: "tools.filter"
          outputParameters:
            - type: object
              mapping: "$."
